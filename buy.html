<!DOCTYPE html>
<html>
<head>
  <title>買書</title>
</head>
<body>

<h2>書籍列表</h2>

<div id="list"></div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];

let html = "";
books.forEach((b)=>{
  html += `<p>${b.title} - $${b.price}</p>`;
});

document.getElementById("list").innerHTML = html;
</script>

</body>
</html>
