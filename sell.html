<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>賣書</title>
</head>

<body>

<h2>📘 賣書上架</h2>

<input id="title" placeholder="書名"><br><br>
<input id="price" placeholder="價格"><br><br>

<button onclick="sellBook()">上架</button>

<!-- LINE LIFF -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- Firebase compat（穩定可用版本） -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 Firebase 設定（你的已填好）
const firebaseConfig = {
  apiKey: "AIzaSyAGFGtA8VWFJA5wrB8e--f54Tk7VJRx9JU",
  authDomain: "liff-book-fe31f.firebaseapp.com",
  projectId: "liff-book-fe31f",
  storageBucket: "liff-book-fe31f.firebasestorage.app",
  messagingSenderId: "1067462386207",
  appId: "1:1067462386207:web:befefae622c22a95a0eb2a"
};

// 初始化 Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LINE LIFF
let userProfile = null;

async function initLIFF() {
  await liff.init({ liffId: "2010373359-QYS2wAVJ" }); // ← 這裡要改

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  userProfile = await liff.getProfile();
}

initLIFF();

// 🔥 上架功能（重點）
async function sellBook() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  if (!title || !price) {
    alert("請填完整資料");
    return;
  }

  await db.collection("books").add({
    title: title,
    price: Number(price),
    sellerId: userProfile.userId,
    sellerName: userProfile.displayName
  });

  alert("✅ 上架成功！");

  document.getElementById("title").value = "";
  document.getElementById("price").value = "";
}

// 🔥 超重要：讓 onclick 找得到
window.sellBook = sellBook;

</script>

</body>
</html>
