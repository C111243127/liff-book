<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>賣書</title>
</head>

<body>

<h2>📘 賣書上架</h2>

<input id="title" placeholder="書名"><br><br>
<input id="price" placeholder="價格"><br><br>

<button onclick="sellBook()">上架</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script type="module">

// 🔥 Firebase（已幫你填好）
import { initializeApp } from "firebase/app";
import { getFirestore, collection, addDoc } from "firebase/firestore";

const firebaseConfig = {
  apiKey: "AIzaSyAGFGtA8VWFJA5wrB8e--f54Tk7VJRx9JU",
  authDomain: "liff-book-fe31f.firebaseapp.com",
  projectId: "liff-book-fe31f",
  storageBucket: "liff-book-fe31f.firebasestorage.app",
  messagingSenderId: "1067462386207",
  appId: "1:1067462386207:web:befefae622c22a95a0eb2a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 LINE LIFF（你要改這裡）
let userProfile = null;

async function initLIFF() {
  await liff.init({ liffId: "2010373359-QYS2wAVJ" }); // ← 只改這裡！

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  userProfile = await liff.getProfile();
}

initLIFF();

// 🔥 上架功能
async function sellBook() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  if (!title || !price) {
    alert("請填完整資料");
    return;
  }

  await addDoc(collection(db, "books"), {
    title: title,
    price: Number(price),
    sellerId: userProfile.userId,
    sellerName: userProfile.displayName
  });

  alert("✅ 上架成功！");

  document.getElementById("title").value = "";
  document.getElementById("price").value = "";
}

window.sellBook = sellBook;

</script>

</body>
</html>
